let c=scorul.achievements.norocosul

lista.innerHTML=`
<div class="trofeu-item ${a ? '' : 'trofeu-blocat'}">
<span>🍔 Gurmand</span>
<span>${a ? '✅ Unlocked' : (scorul.placut + scorul.neplacut) + '/150'}</span>
</div>

<div class="trofeu-item ${b ? '' : 'trofeu-blocat'}">
<span>👕 Fashion Icon</span>
<span>${b ? '✅ Unlocked' : ((scorul.areCaciula ? 1 : 0) + (scorul.areTricou ? 1 : 0)) + '/3'}</span>
</div>

<div class="trofeu-item ${c ? '' : 'trofeu-blocat'}">
<span>🍀 Lucky Day</span>
<span>${c ? '✅ Unlocked' : (scorul.loteriiCastigate || 0) + '/3'}</span>
</div>
`
}
function verificaTrofee () {
if(!scorul.achievements.gurmand && (scorul.placut + scorul.neplacut) >= 150) {
scorul.achievements.gurmand = true;
    scorul.monede += 120;
    alert("🏆 Achievement Unlocked: Gurmand! You won 100 coins!");
} else if(!scorul.achievements.fashionIcon&& scorul.areCaciula && scorul.areTricou) {
scorul.achievements.fashionIcon=true
scorul.monede += 50;
scorul.fericire+=20;
alert("🏆 Achievement Unlocked: Fashion Icon! You won 150 coins!");
} else if(!scorul.achievements.norocosul && scorul.loteriiCastigate===3) {
scorul.achievements.norocosul=true
scorul.monede+=100
alert("🏆 Achievement Unlocked: Lucky day! You won 200 coins!");
}
localStorage.setItem('scorul', JSON.stringify(scorul));
document.querySelector('.text-scor').innerHTML = scorul.monede;
}

function echipeazaHaina(tipHaina) {
if (scorul.monede < 50) {
    alert("Nu ai destule monede! (Ai nevoie de 50)");
    return;
}
if (tipHaina === 'hat' && !scorul.areCaciula) {
    scorul.monede-=50
    scorul.areCaciula = true;
    document.getElementById('hat-layer').style.display = 'block';
    document.querySelector('.text-scor').innerHTML = scorul.monede;
} else if(tipHaina === 'shirt' && !scorul.areTricou) {
        scorul.monede-=50
    scorul.areTricou= true
        document.getElementById('shirt-layer').style.display = 'block';
        document.querySelector('.text-scor').innerHTML = scorul.monede;
}else if(tipHaina === 'glasses' && !scorul.areOchelari) {
 scorul.monede-=50
    scorul.areOchelari = true;
    document.getElementById('glasses-layer').style.display = 'block';
     document.querySelector('.text-scor').innerHTML = scorul.monede;
}

else{
    alert(' Sorry. You already have these one.')
}

localStorage.setItem('scorul', JSON.stringify(scorul));
verificaTrofee();
}


function removeClothes() {
if (
!scorul.areCaciula &&
!scorul.areTricou &&
!scorul.areOchelari
) { 
    alert("You are not wearing anything!");
    return;
}
const returneaza = 100;
scorul.areCaciula = false;
scorul.areTricou = false;
scorul.areOchelari = false;

scorul.monede += returneaza;
document.getElementById('hat-layer').style.display = 'none';
document.getElementById('shirt-layer').style.display = 'none';
document.getElementById('glasses-layer').style.display = 'none';

document.querySelector('.text-scor').innerHTML = scorul.monede;

localStorage.setItem('scorul', JSON.stringify(scorul));
}





function magazinul() {
let panel = document.getElementById('shopPanel');
if (panel.style.display === 'block') {
panel.style.display = 'none';
} else {
panel.style.display = 'block';
}
}

function lotereie() {
if (scorul.monede < 20) {
    alert('You do not have enough coins. You need 20 coins');
    return;
}

scorul.monede -= 20;
scorul.lotteryIndex+=1
if(scorul.lotteryIndex>=3) {
scorul.lotteryIndex=3
}
document.querySelector('.loteryParagraf').innerHTML = 
`Lottery--- ${scorul.lotteryIndex}/3`;
localStorage.setItem('scorul', JSON.stringify(scorul));
let s = Math.random();

if (s >= 0.5 && s < 1) {
    scorul.monede += 50;
    scorul.loteriiCastigate++;
    verificaTrofee();
    alert('Congratulations! You won 50 coins');
} else {
    alert('Sorry. You lost. You can try again');
}

document.querySelector('.text-scor').innerHTML = scorul.monede;
localStorage.setItem('scorul', JSON.stringify(scorul));
}

function mancareaPreferata() {
    if( scorul.monede<100) {
    alert('You do not have enought coins.You need 100 coins')
return
}
scorul.monede-=100
scorul.fericire+=50
if (scorul.fericire > 100) {scorul.fericire = 100}
document.querySelector('.text-scor').innerHTML = scorul.monede;
    document.querySelector('.js-fericire').innerHTML = `Happines: ${scorul.fericire}%`;
    localStorage.setItem('scorul', JSON.stringify(scorul));
}


function deschideCutia () {
    if( scorul.monede<80) {

alert('You do not have enought coins.You need 80 coins')
return
}
scorul.monede-=80
scorul.huntIndex+=1;
if(scorul.huntIndex>=3) {
scorul.huntIndex=3;
}
document.querySelector('.huntParagraf').innerHTML = 
`Treasure hunt--- ${scorul.huntIndex}/3`;
let b= Math.random()
if (b>=0 && b<0.23 ) {
scorul.fericire+= 20
alert('The happines level rised by 50 %')
} else if(b>=0.23 && b<0.36) {
scorul.monede+=15
alert('Congradulations! You won 15 coins ')

}else if(b>=0.36 && b<0.40) {
scorul.monede+=90
alert('Congradulations! You won 90 coins ')
} else if(b>=0.40 && b< 0.55) {
scorul.fericire+= 70
alert('The happines level rised by 70 %')

} else if (b>=0.55 && b<1) {
scorul.monede+=20
alert('Congradulations! You won 20 coins ')
} 
if (scorul.fericire > 100) {scorul.fericire = 100}
document.querySelector('.text-scor').innerHTML = scorul.monede;
    document.querySelector('.js-fericire').innerHTML = `Happines: ${scorul.fericire}%`;
    localStorage.setItem('scorul', JSON.stringify(scorul));

}

function dailyQuests() {
        if(
scorul.feedIndex===10 &&
scorul.lotteryIndex===3 &&
scorul.huntIndex===3 &&
!scorul.dailyRewardClaimed
){

    scorul.monede += 100;
    scorul.dailyRewardClaimed = true;

    document.querySelector('.feedParagraf').innerHTML =
    `Feed--- ${scorul.feedIndex}/10 ✅ Completed`;

    document.querySelector('.loteryParagraf').innerHTML =
    `Lottery--- ${scorul.lotteryIndex}/3 ✅ Completed`;

    document.querySelector('.huntParagraf').innerHTML =
    `Treasure hunt--- ${scorul.huntIndex}/3 ✅ Completed`;

    document.querySelector('.text-scor').innerHTML = scorul.monede;

    localStorage.setItem('scorul', JSON.stringify(scorul));

    alert("🎉 Daily quests completed! +100 coins");
}else {
    alert("❌ You should complete all quests first!");
}
}
function resetareaZilei () {
    let acum = Date.now()
        let diferenta = acum - scorul.dailyLastReset;
        if(diferenta >= 86400000) {

    scorul.feedIndex = 0;
    scorul.lotteryIndex = 0;
    scorul.huntIndex = 0;

    scorul.dailyRewardClaimed = false;

    scorul.dailyLastReset = Date.now();

    document.querySelector('.feedParagraf').innerHTML =
    `Feed--- ${scorul.feedIndex}/10`;

    document.querySelector('.loteryParagraf').innerHTML =
    `Lottery--- ${scorul.lotteryIndex}/3`;

    document.querySelector('.huntParagraf').innerHTML =
    `Treasure hunt--- ${scorul.huntIndex}/3`;
    document.querySelector('.feedParagraf').classList.remove('quest-completed');
document.querySelector('.loteryParagraf').classList.remove('quest-completed');
document.querySelector('.huntParagraf').classList.remove('quest-completed');

    localStorage.setItem('scorul', JSON.stringify(scorul));
}

}

resetareaZilei();
setInterval(resetareaZilei, 60000);

function resetareaJocului() {
if(scorul.fericire >= 100) {
scorul.nivel = (scorul.nivel || 1) + 1;
scorul.monede = (Number(scorul.monede) || 0) + 50;
document.querySelector('.text-scor').innerHTML = scorul.monede;
localStorage.setItem('scorul', JSON.stringify(scorul));
document.querySelector('.js-nivel').innerHTML = `Level: ${scorul.nivel}`;
document.querySelector('.rezultat').innerHTML = "🎉 You won! Capy is 100% happy! 🥳 Game will restart in 8 seconds...";
setTimeout(function(){
reseteazaJocul(); 
}, 8000);
} else if(scorul.fericire <= 0){
    scorul.monede-=10
document.querySelector('.rezultat').innerHTML = "😢You lost... Capy went to sleep. Game will restart in 8 seconds...";
setTimeout(function() {
reseteazaJocul();
}, 8000);
}
}
let valoareInput=document.querySelector('.js-input')

function inputulJucator() {
    if (valoareInput.value.trim() === "") {
    alert("Write a treat first!");
    return;
}
    let container = document.querySelector('.capybara-scene');
let imagineCapibara= document.querySelector('.capibara')
let valoareJucator = valoareInput.value;
let n= Math.random()
if(n>=0.5 && n<1) {
mesaj=`I love you!😍😍😍${valoareJucator} was very good!🤗🤗🤗`
scorul.fericire+=15
imagineCapibara.src="images/happy-capy.png"
container.className = "capybara-scene happy-mode";
}

else {
scorul.fericire-=2
mesaj=`I dont want ${valoareJucator}! I want something else!`
imagineCapibara.src="images/capy-sad-image.png"
container.className = "capybara-scene sad-mode";
}
if (scorul.fericire > 100) {
scorul.fericire = 100;
}
if (scorul.fericire < 0) {
scorul.fericire = 0;
}
document.querySelector('.rezultat').innerHTML = mesaj;

document.querySelector('.js-fericire').innerHTML = `Happines: ${scorul.fericire}%`;

localStorage.setItem('scorul', JSON.stringify(scorul));

valoareInput.value = ""; 
verificaTrofee();
resetareaJocului() 
}
