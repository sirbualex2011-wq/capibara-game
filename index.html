                    <!DOCTYPE html>
                    <html> 
                    <head>
                            <style>


body{
    background-color: rgb(254, 249, 211) ;
    font-family: Arial;
}


    .capibara{

        height: 130px;

.js-fericire {
    font-size: 24px;
    font-weight: 800;
    color: #ffffff;
    background: linear-gradient(135deg, #ff9233 0%, #ffdb33 100%);
    padding: 12px 30px;
    border-radius: 50px;
    display: inline-block;
    text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
    box-shadow: 0 4px 15px rgba(255, 146, 51, 0.4);
}

.js-input {
padding: 17px;
border: 2px dashed #ff9233;
border-radius: 10px;
background-color: #fff9e6;

}

.js-input::placeholder {
color: #ffb77a;
}
.container-input {
display: flex;         
justify-content: center; 
align-items: center;   
gap: 10px;

}

                            <title>My Capybara😍</title>
                            <meta name="description" content="A cute virtual pet game where you take care of a capybara. Feed it, play with it, and enjoy relaxing moments!">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">
                            <meta name="google-site-verification" content="L9KDqRZSNQi2CJXd3o2ETec8p4bSKBrCNoXvuJrEu2o" />
                    </head>
                            <body>
                            
                    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8"> 
            <p class="text">I am Capy and I am your virtual pet!</p>
            <p>You can feed me with these 5 treats!</p>
            <p class="capibara-text"></p>
            <p class="capi"></p>
            <p class="rezultat resultat-text"></p>
<p class="js-scorul"></p>

    <img class="capibara" src="images\capibara-image.png" onclick="
    document.querySelector('.capi')
    .innerHTML=`I am Capy!`
    ">

            <button class="js-morcov buton"
            onclick="
            hranesteCapibara ('carrot')
            "
            ><img class="morcov" src="images\morcov-buton-image.png">
            </button>

            <button class="js-mar buton"
            onclick=" hranesteCapibara ('apple')"
            ><img class="mar" src="images\mar-buton-image.png">
                    
            </button>
            
            <button class="js-banana buton"
            onclick=" hranesteCapibara ('banana')"
            ><img class="banana" src="images/banana-buton-image.png">
        </button>

            <button class="js-capsuna buton"
            onclick=" hranesteCapibara ('strawbery')"
            ><img class="capsuna" src="images/capsuna-buton-image.png">
        </button>

            <button class="js-apa buton"
            onclick=" hranesteCapibara ('water')"
            ><img class="apa" src="images/apa-buton-image.png">
        </button>

<p class="js-nivel">Level: 1</p>
<p class="js-fericire"></p>
<div class="container-input">
<input class="js-input" placeholder="Type the name of the treat" >
<button onclick="inputulJucator()" class="buton-feed">Feed Capy!</button>
</div>
<p id="mesaj-afisat"></p>
                    <script>


    let scorul=  JSON.parse(localStorage.getItem
    ('scorul')) ||{
    placut: 0,
neplacut: 0,
fericire: 50,
nivel:1
}
if (scorul.fericire === undefined) {
scorul.fericire = 50;
}

let preferinta=''
let mesaj=''
    function hranesteCapibara (hrana) {
    let numar= Math.random()
    
    if (numar>=0 && numar<0.23 ) {
    preferinta='apple'
    } else if(numar>=0.23 && numar<0.36) {
        preferinta= 'water'
    }else if(numar>=0.36 && numar<0.40) {
        preferinta='strawbery'
    } else if(numar>=0.40 && numar< 0.55) {
        preferinta='banana'
    } else if (numar>=0.55 && numar<1) {
        preferinta='carrot'
    }

    let imagineCapibara= document.querySelector('.capibara')

    
    if(preferinta===hrana) {
        mesaj= `I love you!😍😍😍${hrana} was very good!🤗🤗🤗`
    imagineCapibara.src="images/capibara-image-happy.png"
    imagineCapibara.classList.add('capibara-happy')
    scorul.placut+=1
    scorul.fericire+=15
    if(scorul.fericire>100) {
        scorul.fericire=100;
    }
    } else{
        mesaj=`I don't want ${hrana}! I want something else!`
        imagineCapibara.src="images/sad-capibara-imagine.png"
        imagineCapibara.classList.add('capibara-sad')
        scorul.neplacut+=1
        scorul.fericire-=2; 
        if(scorul.fericire<0) {
    scorul.fericire=0
        }
    }
    document.querySelector('.rezultat')
    .innerHTML= mesaj
document.querySelector('.js-fericire')
.innerHTML=`Happines: ${scorul.fericire}%`
localStorage.setItem('scorul',JSON.stringify(scorul))
document.querySelector('.js-scorul')
.innerHTML=`I liked:${scorul.placut}  I didn't like :${scorul.neplacut}`
localStorage.setItem('scorul', JSON.stringify(scorul))
document.querySelector('.js-scorul')
.innerHTML= `I liked:${scorul.placut} I didn't like:${scorul.neplacut}`

resetareaJocului()
    }
    
    document.querySelector('.js-fericire').innerHTML = `Happines: ${scorul.fericire}%`;
setInterval(function() {
    if(scorul.fericire>0 && scorul.fericire<100) {
scorul.fericire-=1;
    }
    if(scorul.fericire<0) {
        scorul.fericire=0
    }

document.querySelector('.js-fericire')
.innerHTML = `Happines: ${scorul.fericire}%`;
localStorage.setItem('scorul', JSON.stringify(scorul));
resetareaJocului()
},10800000  );
function reseteazaJocul() {
scorul.fericire = 50;
scorul.placut = 0;
scorul.neplacut = 0;
localStorage.setItem('scorul', JSON.stringify(scorul));

document.querySelector('.rezultat').innerHTML = ""; 
document.querySelector('.js-fericire').innerHTML = `Happines: ${scorul.fericire}%`; 
document.querySelector('.js-scorul').innerHTML = `I liked:${scorul.placut}  I didn't like:${scorul.neplacut}`; 

let imagineCapibara = document.querySelector('.capibara');
imagineCapibara.src = "images/capibara-image.png";
imagineCapibara.className = 'capibara';
}

function resetareaJocului() {
if(scorul.fericire >= 100) {
    scorul.nivel = (scorul.nivel || 1) + 1;
    localStorage.setItem('scorul', JSON.stringify(scorul));
    document.querySelector('.js-nivel').innerHTML = `Level: ${scorul.nivel}`;
    document.querySelector('.rezultat').innerHTML = "🎉 You won! Capy is 100% happy! 🥳 Game will restart in 8 seconds...";
    setTimeout(function(){
        reseteazaJocul(); 
    }, 8000);
} else if(scorul.fericire <= 0){
    document.querySelector('.rezultat').innerHTML = "😢You lost... Capy went to sleep. Game will restart in 8 seconds...";
    setTimeout(function() {
        reseteazaJocul();
    }, 8000);
}
}
    let valoareInput=document.querySelector('.js-input')
    function inputulJucator() {
        let imagineCapibara= document.querySelector('.capibara')
    let valoareJucator = valoareInput.value;
    let n= Math.random()
    if(n>=0.5 && n<1) {
        mesaj=`I love you!😍😍😍${valoareJucator} was very good!🤗🤗🤗`
        scorul.fericire+=15
        imagineCapibara.src="images/capibara-image-happy.png"
    imagineCapibara.classList.add('capibara-happy')
    }
    
    else {
        scorul.fericire-=2
        mesaj=`I dont want ${valoareJucator}! I want something else!`
        imagineCapibara.src="images/sad-capibara-imagine.png"
        imagineCapibara.classList.add('capibara-sad')
    }
        if (scorul.fericire > 100) {
        scorul.fericire = 100;
    }
    if (scorul.fericire < 0) {
    scorul.fericire = 0;
    }
        document.querySelector('.rezultat').innerHTML = mesaj;
document.querySelector('.js-fericire').innerHTML = `Happines: ${scorul.fericire}%`;
localStorage.setItem('scorul', JSON.stringify(scorul));
    valoareInput.value = ""; 
    resetareaJocului() 
}   
                    </script>
                    </body>
                    </html>
